<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portal de Acesso</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d47a1">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#0d47a1,#1976d2);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.card{
    width:90%;
    max-width:400px;
    background:white;
    color:#333;
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
}

.logo{
    width:100px;
    height:100px;
    border-radius:25px;
    margin:auto;
    margin-bottom:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#1976d2;
    color:white;
    font-size:40px;
    font-weight:bold;
}

h1{
    margin-bottom:10px;
}

p{
    color:#666;
    margin-bottom:25px;
}

.btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    margin-top:10px;
}

.primary{
    background:#1976d2;
    color:white;
}

.install{
    background:#43a047;
    color:white;
    display:none;
}

.footer{
    margin-top:20px;
    font-size:12px;
    color:#888;
}
</style>
</head>

<body>

<div class="card">

    <div class="logo">A</div>

    <h1>Portal de Acesso</h1>

    <p>
        Instale o aplicativo para acesso rápido ao sistema.
    </p>

    <button class="btn primary" onclick="abrirSistema()">
        Entrar no Sistema
    </button>

    <button id="installBtn" class="btn install">
        Instalar Aplicativo
    </button>

    <div class="footer">
        Versão 1.0
    </div>

</div>

<script>
const URL_APP =
"https://script.google.com/macros/s/AKfycbzkLLdAr8MgzFkn0-rIeN8eS8RnzuVDoEfxSEC1SjcVwh5jKOYDNjigvNVi3fVS9CAChg/exec";

function abrirSistema(){
    window.location.href = URL_APP;
}

let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;

    document.getElementById('installBtn').style.display='block';
});

document.getElementById('installBtn').addEventListener('click', async () => {

    if(!deferredPrompt) return;

    deferredPrompt.prompt();

    await deferredPrompt.userChoice;

    deferredPrompt = null;
});

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./service-worker.js');
}
</script>

</body>
</html>
